<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz NeuroSpark</title>

<!-- Preload critical images -->
<link rel="preload" as="image" href="/images/brain-gamma-waves.webp" />
<link rel="preload" as="image" href="/images/dra_vargas.webp" />

<!-- Distinctive font: Plus Jakarta Sans - geometric, authoritative, warm -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />

<style>
/* ─── DESIGN TOKENS ──────────────────────────────────── */
:root {
  --primary:        #1E3A8A;
  --primary-tint:   rgba(30, 58, 138, 0.06);
  --primary-light:  #2D4FA8;
  --accent:         #0D9488;
  --accent-light:   rgba(13, 148, 136, 0.08);
  --cta:            #10B981;
  --cta-dark:       #059669;
  --cta-glow:       rgba(16, 185, 129, 0.35);
  --alert:          #DC2626;
  --alert-bg:       #FEF2F2;
  --alert-border:   #F87171;
  --bg-global:      #F0F4FF;
  --bg-card:        #FFFFFF;
  --bg-option:      #FFFFFF;
  --border-default: #E2E8F0;
  --border-selected:#1E3A8A;
  --text-dark:      #0F172A;
  --text-mid:       #475569;
  --text-light:     #94A3B8;
  --progress-bg:    #E2E8F0;
  --radius-card:    16px;
  --radius-option:  12px;
  --radius-btn:     12px;
  --shadow-card:    0 4px 24px rgba(30,58,138,0.10), 0 1px 4px rgba(30,58,138,0.06);
  --font-display:   'Sora', sans-serif;
  --font-body:      'Plus Jakarta Sans', sans-serif;
  --transition-step: 300ms ease-out;
}

/* ─── RESET & BASE ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-global);
  color: var(--text-dark);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 40px;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(30,58,138,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(13,148,136,0.08) 0%, transparent 70%);
  background-attachment: fixed;
}

/* ─── HEADER BRAND ───────────────────────────────────── */
.brand-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  gap: 8px;
}
.brand-logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.brand-name {
  font-family: var(--font-display);
  font-size: clamp(0.95rem, 2.5vw, 1.1rem);
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
}
.brand-name span { color: var(--accent); }

/* ─── QUIZ WRAPPER ───────────────────────────────────── */
#quiz-wrapper {
  width: 100%;
  max-width: 640px;
  padding: 0 16px;
  flex: 1;
}

/* ─── CARD CONTAINER ─────────────────────────────────── */
.quiz-card {
  background: var(--bg-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  border: 1px solid rgba(30,58,138,0.07);
}

/* ─── PROGRESS BAR ───────────────────────────────────── */
.progress-bar-wrap {
  padding: 0;
  background: var(--bg-card);
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid rgba(30,58,138,0.06);
}
.progress-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 8px;
}
.progress-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.progress-pct {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--primary);
}
.progress-track {
  height: 5px;
  background: var(--progress-bg);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  border-radius: 0 4px 4px 0;
}

/* ─── STEP CONTENT ───────────────────────────────────── */
.step-content {
  padding: clamp(20px, 5vw, 32px) clamp(16px, 5vw, 28px) clamp(20px, 5vw, 28px);
  animation: stepIn 0.35s ease-out both;
}
@keyframes stepIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.step-content.step-out {
  animation: stepOut 0.15s ease-in both;
}
@keyframes stepOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-8px); }
}

/* ─── STEP TYPE: HEADLINE ────────────────────────────── */
.step-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-tint);
  color: var(--primary);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 100px;
  padding: 4px 10px;
  margin-bottom: 14px;
}
.step-promise {
  font-size: clamp(0.78rem, 2.2vw, 0.85rem);
  font-weight: 600;
  color: #4A5568;
  line-height: 1.55;
  margin-bottom: 14px;
  padding: 8px 12px;
  background: var(--primary-tint);
  border-radius: 8px;
  text-align: center;
}
.step-headline {
  font-family: var(--font-display);
  font-size: clamp(1.05rem, 3.5vw, 1.2rem);
  font-weight: 700;
  line-height: 1.35;
  color: var(--text-dark);
  margin-bottom: 18px;
  letter-spacing: -0.02em;
}
.step-subtext {
  font-size: clamp(0.88rem, 2.5vw, 0.95rem);
  color: var(--text-mid);
  line-height: 1.6;
  margin-bottom: 20px;
}
.step-hint {
  font-size: 0.78rem;
  color: var(--text-light);
  margin-bottom: 16px;
  font-style: italic;
}

/* ─── OPTIONS ────────────────────────────────────────── */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  min-height: 56px;
  padding: 14px 16px;
  background: var(--bg-option);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-option);
  cursor: pointer;
  text-align: left;
  font-family: var(--font-body);
  font-size: clamp(0.88rem, 2.5vw, 0.94rem);
  font-weight: 500;
  color: var(--text-dark);
  line-height: 1.45;
  transition:
    border-color 0.18s ease,
    background 0.18s ease,
    transform 0.1s ease,
    box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}
.option-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--primary-tint);
  opacity: 0;
  transition: opacity 0.18s ease;
  border-radius: inherit;
}
.option-btn:hover { border-color: #BFDBFE; background: #F8FAFF; }
.option-btn:hover::before { opacity: 1; }
.option-btn:active { transform: scale(0.98); }
.option-btn.selected {
  border-color: var(--border-selected);
  border-width: 2px;
  background: var(--primary-tint);
  box-shadow: 0 0 0 3px rgba(30,58,138,0.10);
}
.option-text { flex: 1; }
.option-check {
  width: 20px; height: 20px;
  border: 2px solid var(--border-default);
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease;
  margin-left: auto;
}
.option-btn.selected .option-check {
  background: var(--primary);
  border-color: var(--primary);
}
.option-check-inner {
  width: 8px; height: 8px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  transform: scale(0);
  transition: all 0.18s ease;
}
.option-btn.selected .option-check-inner { opacity: 1; transform: scale(1); }

/* Multi-select check is a checkmark */
.multi-check {
  width: 20px; height: 20px;
  border: 2px solid var(--border-default);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease;
  margin-left: auto;
}
.option-btn.selected .multi-check {
  background: var(--primary);
  border-color: var(--primary);
}
.multi-check svg { opacity: 0; transform: scale(0.5); transition: all 0.18s ease; }
.option-btn.selected .multi-check svg { opacity: 1; transform: scale(1); }

/* ─── NEXT BUTTON ────────────────────────────────────── */
.btn-next {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 17px 24px;
  background: linear-gradient(135deg, var(--cta) 0%, #0EA472 100%);
  color: #fff;
  font-family: var(--font-display);
  font-size: clamp(0.92rem, 2.5vw, 1rem);
  font-weight: 700;
  border: none;
  border-radius: var(--radius-btn);
  cursor: pointer;
  margin-top: 20px;
  letter-spacing: -0.01em;
  transition: transform 0.12s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 16px rgba(16,185,129,0.3);
}
.btn-next:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(16,185,129,0.4);
}
.btn-next:active { transform: scale(0.98) translateY(0); }
.btn-next:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-next .arrow { font-size: 1.1em; transition: transform 0.2s ease; }
.btn-next:hover .arrow { transform: translateX(3px); }

/* ─── BREAK STEP (EDUCATIONAL) ──────────────────────── */
.break-card {
  background: linear-gradient(135deg, #EEF2FF 0%, #F0FDFA 100%);
  border: 1px solid rgba(30,58,138,0.12);
  border-radius: 14px;
  padding: 20px;
  margin: 16px 0;
  text-align: center;
}
.break-brain-img {
  width: 100%;
  max-width: 260px;
  height: auto;
  aspect-ratio: 4/3;
  border-radius: 12px;
  display: block;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, #C7D2FE 0%, #A7F3D0 100%);
  object-fit: cover;
}
/* Fallback if image missing */
.break-brain-img-placeholder {
  width: 100%;
  max-width: 260px;
  height: 195px;
  border-radius: 12px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, #C7D2FE 0%, #99F6E4 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  color: var(--primary);
}
.break-brain-icon { font-size: 48px; }
.break-body {
  font-size: clamp(0.88rem, 2.5vw, 0.95rem);
  color: var(--text-dark);
  line-height: 1.65;
  margin-bottom: 10px;
}
.break-highlight {
  font-weight: 700;
  color: var(--primary);
}
.break-stat {
  display: inline-block;
  background: var(--primary);
  color: white;
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 14px;
}

/* ─── LOADING SCREEN ─────────────────────────────────── */
.loading-wrap { text-align: center; padding: 8px 0 4px; }
.loading-title {
  font-family: var(--font-display);
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
}
.loading-subtitle { font-size: 0.84rem; color: var(--text-light); margin-bottom: 24px; }

.fake-progress-wrap { margin: 0 0 28px; }
.fake-progress-track {
  height: 8px;
  background: #EEF2FF;
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 6px;
}
.fake-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
  border-radius: 100px;
  transition: width 0.6s ease;
  width: 0%;
}
.fake-progress-pct {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--primary);
  text-align: right;
}

.loading-steps { list-style: none; text-align: left; display: flex; flex-direction: column; gap: 12px; }
.loading-step {
  display: flex; align-items: center; gap: 12px;
  font-size: 0.88rem;
  color: var(--text-mid);
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.loading-step.visible { opacity: 1; transform: translateX(0); }
.loading-step-icon {
  width: 22px; height: 22px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid #C7D2FE;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.check-icon {
  width: 20px; height: 20px;
  background: var(--cta);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.check-icon svg { width: 11px; height: 11px; }

/* ─── RESULTS SCREEN ─────────────────────────────────── */
.results-header {
  text-align: center;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-default);
  margin-bottom: 20px;
}
.results-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #DCFCE7; color: #166534;
  font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 4px 12px; border-radius: 100px;
  margin-bottom: 12px;
}
.results-title {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 4vw, 1.5rem);
  font-weight: 800; color: var(--primary);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.results-subtitle { font-size: 0.88rem; color: var(--text-mid); }

/* Clinical report block */
.report-block {
  background: #F8FAFF;
  border: 1px solid rgba(30,58,138,0.14);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 20px;
}
.report-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0;
  border-bottom: 1px dashed #E2E8F0;
  font-size: clamp(0.82rem, 2.2vw, 0.9rem);
  line-height: 1.5;
}
.report-row:last-child { border-bottom: none; padding-bottom: 0; }
.report-icon { font-size: 1em; flex-shrink: 0; margin-top: 1px; }
.report-text { flex: 1; }
.report-label { color: var(--text-light); font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.report-value { font-weight: 600; color: var(--text-dark); }

/* Alert block */
.alert-block {
  background: var(--alert-bg);
  border: 1.5px solid var(--alert-border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 22px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  text-align: center;
}
.alert-badge {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--alert);
  font-size: 0.74rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase;
}
.alert-text {
  font-size: clamp(0.85rem, 2.4vw, 0.92rem);
  color: #7F1D1D;
  line-height: 1.6;
  font-weight: 500;
}
.alert-text strong { color: var(--alert); }
.dra-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--alert-border);
  background: linear-gradient(135deg, #FCA5A5, #FECACA);
  display: block;
}
.dra-avatar-placeholder {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FCA5A5, #FECACA);
  border: 3px solid var(--alert-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}
.dra-name { font-size: 0.8rem; color: var(--text-mid); font-weight: 600; margin-top: 4px; }
.dra-title { font-size: 0.72rem; color: var(--text-light); }

/* CTA Button pulsing */
.btn-cta {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 18px 24px;
  background: linear-gradient(135deg, var(--cta) 0%, #059669 100%);
  color: white; font-family: var(--font-display);
  font-size: clamp(0.9rem, 2.8vw, 1rem); font-weight: 800;
  border: none; border-radius: var(--radius-btn);
  cursor: pointer; letter-spacing: -0.01em;
  text-align: center; line-height: 1.35;
  animation: pulse-cta 2s ease-in-out infinite;
  transition: transform 0.12s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn-cta:active { transform: scale(0.98); }
@keyframes pulse-cta {
  0%, 100% { box-shadow: 0 4px 16px var(--cta-glow); }
  50% { box-shadow: 0 4px 36px rgba(16,185,129,0.55), 0 0 0 6px rgba(16,185,129,0.12); }
}

.social-proof {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-light);
  margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.sp-dot { width: 6px; height: 6px; background: var(--cta); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ─── MEDIA QUERIES ──────────────────────────────────── */
@media (min-width: 640px) {
  body { justify-content: center; padding: 32px 16px; }
  #quiz-wrapper { padding: 0; }
  .quiz-card { box-shadow: 0 8px 40px rgba(30,58,138,0.14), 0 2px 8px rgba(30,58,138,0.08); }
}
@media (max-width: 374px) {
  .step-headline { font-size: 1rem; }
  .option-btn { min-height: 52px; padding: 12px 14px; }
}

/* Sticky next button — always above the fold on mobile */
@media (max-width: 639px) {
  .btn-next-sticky {
    position: sticky;
    bottom: 0;
    z-index: 5;
    background: white;
    padding: 10px 0 calc(env(safe-area-inset-bottom, 0px) + 10px);
    margin-top: 12px;
    box-shadow: 0 -8px 20px rgba(255,255,255,0.95);
  }
}
</style>
</head>
<body>

<!-- Brand -->
<div class="brand-bar">
  <div class="brand-logo">🧠</div>
  <div class="brand-name">Neuro<span>Spark</span></div>
</div>

<!-- Quiz -->
<div id="quiz-wrapper">
  <div class="quiz-card" id="quiz-card">

    <!-- Progress -->
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span class="progress-pct" id="step-pct">15%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:15%"></div>
      </div>
    </div>

    <!-- Steps rendered here -->
    <div id="step-mount"></div>

  </div>
</div>

<script>
/* ─── STATE ──────────────────────────────────────────── */
const state = {
  current: 0,
  answers: {}
};

/* ─── QUIZ DATA ──────────────────────────────────────── */
const steps = [
  // Step 1 — single_select
  {
    id: 'step1', type: 'single_select',
    headline: "El 'Reinicio Neurológico' De 12 Minutos Que Está Transformando Crisis En Calma Y Silencio En Palabras.",
    question: '¿Tu hijo suele taparse los oídos con sonidos comunes (como la licuadora), pero a veces parece no escucharte cuando lo llamas por su nombre?',
    options: [
      '✅ Sí, eso pasa constantemente en casa',
      '🤔 No, sí me escucha pero se le dificulta hablar'
    ]
  },
  // Step 2 — multi_select
  {
    id: 'step2', type: 'multi_select',
    question: '¿Cuáles de estas terapias o métodos has intentado con tu hijo sin ver el progreso rápido que esperabas?',
    hint: '(Puedes seleccionar más de uno)',
    options: [
      '🧩 Terapias conductuales tradicionales (ABA, etc.)',
      '🗣️ Terapia de lenguaje o fonoaudiología',
      '🥗 Dietas restrictivas (sin gluten, sin caseína)',
      '🎧 Musicoterapia tradicional o integración sensorial',
      '🤷‍♀️ Siento que he invertido mucho y el avance es casi invisible'
    ],
    nextLabel: 'Siguiente →'
  },
  // Step 3 — break
  {
    id: 'step3', type: 'break',
    stat: 'IMPORTANTE',
    body: [
      'Respira profundo: los retrocesos de tu hijo no son culpa tuya.',
      'Su cerebro está luchando contra una deficiencia de Ondas Gamma (40Hz). Hasta que no sincronicemos esta frecuencia, las áreas del lenguaje seguirán desconectadas.'
    ],
    imgSrc: '/images/break-brain.webp',
    nextLabel: 'Ver cómo sincronizar su cerebro →'
  },
  // Step 4 — single_select (age)
  {
    id: 'step4', type: 'single_select',
    question: 'Para poder personalizar el resultado, ¿qué edad tiene tu hijo(a)?',
    options: [
      '👶 2 a 4 años',
      '👦 5 a 8 años',
      '🧑 9 a 12 años',
      '👱‍♂️ Más de 12 años'
    ]
  },
  // Step 5 — multi_select (pain points)
  {
    id: 'step5', type: 'multi_select',
    question: '¿Cuál es el desafío diario que más te agota o te duele como mamá en este momento?',
    hint: '(Selecciona todos los que apliquen)',
    options: [
      '🔇 Su falta de comunicación verbal y no poder escuchar su voz',
      '💥 Las crisis sensoriales intensas e impredecibles',
      '🫣 La falta de contacto visual y conexión conmigo',
      '😴 Los problemas para dormir y la hiperactividad constante',
      '💔 El miedo constante a qué pasará con él en el futuro'
    ],
    nextLabel: 'Terminar y generar mi protocolo →'
  },
  // Step 6 — loading
  { id: 'step6', type: 'loading' },
  // Step 7 — results
  { id: 'step7', type: 'results' }
];

/* Progress % map (steps 0-indexed, steps 0-4 are quiz, 5 is loading, 6 is results) */
const progressMap = [15, 30, 50, 65, 82, 95, 100];
const stepLabels  = ['Paso 1 de 5','Paso 2 de 5','Análisis','Paso 3 de 5','Paso 4 de 5','Procesando...','Resultados'];

/* ─── RENDER ENGINE ──────────────────────────────────── */
function mount() { renderStep(state.current); }

function renderStep(idx) {
  updateProgress(idx);
  const step = steps[idx];
  const mount = document.getElementById('step-mount');

  // Fade out current
  const existing = mount.querySelector('.step-content');
  if (existing) {
    existing.classList.add('step-out');
    setTimeout(() => { mount.innerHTML = ''; buildStep(step, mount); }, 150);
  } else {
    buildStep(step, mount);
  }
}

function buildStep(step, container) {
  let html = '';
  switch (step.type) {
    case 'single_select': html = buildSingle(step); break;
    case 'multi_select':  html = buildMulti(step); break;
    case 'break':         html = buildBreak(step); break;
    case 'loading':       html = buildLoading(); break;
    case 'results':       html = buildResults(); break;
  }
  container.innerHTML = '<div class="step-content">' + html + '</div>';
  postRender(step);
}

/* ─── HTML BUILDER HELPERS (no nested template literals) ─ */
function radioOption(opt, i) {
  return '<button class="option-btn" role="radio" aria-checked="false"'
    + ' aria-label="' + escAttr(opt) + '" data-idx="' + i + '"'
    + ' onclick="selectSingle(this,' + i + ')">'
    + '<span class="option-text">' + opt + '</span>'
    + '<span class="option-check" aria-hidden="true">'
    + '<span class="option-check-inner"></span>'
    + '</span></button>';
}

function checkOption(opt, i) {
  var svg = '<svg viewBox="0 0 12 10" fill="none" stroke="white"'
    + ' stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
    + '<polyline points="1,5 4,8 11,1"/></svg>';
  return '<button class="option-btn" role="checkbox" aria-checked="false"'
    + ' aria-label="' + escAttr(opt) + '" data-idx="' + i + '"'
    + ' onclick="toggleMulti(this,' + i + ')">'
    + '<span class="option-text">' + opt + '</span>'
    + '<span class="multi-check" aria-hidden="true">' + svg + '</span>'
    + '</button>';
}

function loadingItem(msg, i) {
  return '<li class="loading-step" id="ls-' + i + '">'
    + '<span class="loading-step-icon" id="lsi-' + i + '">'
    + '<div class="spinner"></div></span>'
    + '<span>' + msg + '</span></li>';
}

function breakPara(p, i) {
  var style = i === 0 ? '' : ' style="margin-top:10px;"';
  return '<p class="break-body"' + style + '>' + p + '</p>';
}

function escAttr(s) {
  return s.replace(/"/g, '&quot;');
}

/* ─── STEP BUILDERS ──────────────────────────────────── */
function buildSingle(step) {
  var headlineHtml = '';
  if (step.headline) {
    headlineHtml = '<p class="step-promise">' + step.headline + '</p>';
  }
  var optionsHtml = step.options.map(radioOption).join('');
  var hintHtml = step.options.length <= 2
    ? '<p class="step-hint" style="margin-top:12px;text-align:center;">* Selecciona tu respuesta para comenzar.</p>'
    : '';
  return headlineHtml
    + '<h1 class="step-headline">' + step.question + '</h1>'
    + '<div class="options-list" role="radiogroup">' + optionsHtml + '</div>'
    + hintHtml;
}

function buildMulti(step) {
  var hintHtml = step.hint ? '<p class="step-hint">' + step.hint + '</p>' : '';
  var optionsHtml = step.options.map(checkOption).join('');
  var label = step.nextLabel || 'Siguiente';
  return '<p class="step-subtext">' + step.question + '</p>'
    + hintHtml
    + '<div class="options-list" role="group">' + optionsHtml + '</div>'
    + '<div class="btn-next-sticky">'
    + '<button class="btn-next" id="btn-next-multi" onclick="advanceMulti()" disabled>'
    + label + ' <span class="arrow">→</span></button></div>';
}

function buildBreak(step) {
  var firstPara = step.body.length > 0 ? breakPara(step.body[0], 0) : '';
  var restParas = step.body.slice(1).map(function(p, i) { return breakPara(p, i + 1); }).join('');
  var imgBlock  = '<div class="break-brain-img-placeholder" id="brain-img-wrap">'
    + '<div class="break-brain-icon">🧠</div>'
    + '<div style="font-size:0.7rem;color:var(--primary);font-weight:600;">Ondas Gamma 40Hz</div>'
    + '</div>';
  return '<div class="break-card">'
    + '<span class="break-stat">' + step.stat + '</span>'
    + firstPara
    + imgBlock
    + restParas
    + '</div>'
    + '<div class="btn-next-sticky">'
    + '<button class="btn-next" onclick="advance()">'
    + step.nextLabel + ' <span class="arrow">→</span></button>'
    + '</div>';
}

function buildLoading() {
  var msgs = [
    'Analizando respuestas y cruces conductuales...',
    'Verificando historial de terapias...',
    'Calculando nivel de desregulación neurosensorial...',
    'Evaluando potencial de plasticidad cerebral...',
    'Generando Protocolo de Sincronización Gamma...'
  ];
  var itemsHtml = msgs.map(loadingItem).join('');
  return '<div class="loading-wrap">'
    + '<p class="loading-title">Procesando tu perfil neurológico</p>'
    + '<p class="loading-subtitle">Por favor espera, esto tomará unos segundos…</p>'
    + '<div class="fake-progress-wrap">'
    + '<div class="fake-progress-track"><div class="fake-progress-fill" id="fake-fill"></div></div>'
    + '<div class="fake-progress-pct" id="fake-pct">0%</div>'
    + '</div>'
    + '<ul class="loading-steps" id="loading-steps">' + itemsHtml + '</ul>'
    + '</div>';
}

function buildResults() {
  return `
    <div class="results-header">
      <div class="results-badge">✅ Análisis Completado</div>
      <h2 class="results-title">El Perfil Neurológico De Tu Hijo</h2>
      <p class="results-subtitle">Resultados Finalizados</p>
    </div>

    <div class="report-block">
      <div class="report-row">
        <span class="report-icon">🔴</span>
        <div class="report-text">
          <div class="report-label">Origen probable</div>
          <div class="report-value">Desconexión de redes neurales</div>
        </div>
      </div>
      <div class="report-row">
        <span class="report-icon">⚠️</span>
        <div class="report-text">
          <div class="report-label">Factor bloqueante</div>
          <div class="report-value">Deficiencia de Ondas Gamma (40Hz)</div>
        </div>
      </div>
      <div class="report-row">
        <span class="report-icon">📊</span>
        <div class="report-text">
          <div class="report-label">Nivel de plasticidad actual</div>
          <div class="report-value">Alto — Apto para entrainment</div>
        </div>
      </div>
      <div class="report-row">
        <span class="report-icon">✅</span>
        <div class="report-text">
          <div class="report-label">Pronóstico de estimulación</div>
          <div class="report-value">Altamente Favorable</div>
        </div>
      </div>
    </div>

    <div class="alert-block">
      <div class="alert-badge">⚠️ ALERTA URGENTE</div>
      <div id="dra-avatar-wrap">
        <div class="dra-avatar-placeholder">👩‍⚕️</div>
      </div>
      <div>
        <div class="dra-name">Dra. Elisa Vargas</div>
        <div class="dra-title">Ex investigadora del MIT</div>
      </div>
      <p class="alert-text">
        Hemos preparado una presentación urgente con la <strong>Dra. Elisa Vargas</strong>, ex investigadora del MIT, explicando cómo reactivar estas ondas desde tu casa hoy mismo.
      </p>
    </div>

    <button class="btn-cta" onclick="handleCTA()">
      Ver la presentación gratuita de la Dra. Elisa →
    </button>

    <p class="social-proof">
      <span class="sp-dot"></span>
      Más de 127 familias ya han logrado que sus hijos conecten y comuniquen usando esta frecuencia exacta.
    </p>
  `;
}

/* ─── PROGRESS ───────────────────────────────────────── */
function updateProgress(idx) {
  var pct = progressMap[idx] || 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-pct').textContent = pct + '%';
}

/* ─── INTERACTION HANDLERS ───────────────────────────── */
function selectSingle(btn, idx) {
  // Visual feedback
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('selected'); b.setAttribute('aria-checked','false');
  });
  btn.classList.add('selected');
  btn.setAttribute('aria-checked','true');
  state.answers[state.current] = idx;
  // Auto-advance after 400ms
  setTimeout(() => advance(), 400);
}

function toggleMulti(btn, idx) {
  btn.classList.toggle('selected');
  const checked = btn.classList.contains('selected');
  btn.setAttribute('aria-checked', checked ? 'true' : 'false');
  const anySelected = document.querySelectorAll('.option-btn.selected').length > 0;
  const nextBtn = document.getElementById('btn-next-multi');
  if (nextBtn) nextBtn.disabled = !anySelected;
}

function advanceMulti() {
  const selected = [...document.querySelectorAll('.option-btn.selected')].map(b => b.dataset.idx);
  state.answers[state.current] = selected;
  advance();
}

function advance() {
  state.current++;
  if (state.current >= steps.length) return;
  renderStep(state.current);
  if (steps[state.current].type === 'loading') startLoading();
}

function handleCTA() {
  window.location.href = '/neuro_vsl/' + window.location.search;
}

/* ─── LOADING SEQUENCE ───────────────────────────────── */
function startLoading() {
  const delays = [0, 1000, 2000, 3000, 4200];
  const totalDuration = 5800;

  // Animate fake progress bar
  let pct = 0;
  const interval = setInterval(() => {
    pct = Math.min(pct + (pct < 90 ? 1.4 : 0.2), 99);
    const fill = document.getElementById('fake-fill');
    const pctEl = document.getElementById('fake-pct');
    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = Math.floor(pct) + '%';
    if (pct >= 99) clearInterval(interval);
  }, 60);

  // Reveal each loading step
  delays.forEach((delay, i) => {
    setTimeout(() => {
      const step = document.getElementById(`ls-${i}`);
      if (!step) return;
      step.classList.add('visible');
      // After 800ms, mark previous as done (show check)
      if (i > 0) {
        const prev = document.getElementById(`lsi-${i-1}`);
        if (prev) prev.innerHTML = `<div class="check-icon"><svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,5 4,8 11,1"/></svg></div>`;
      }
    }, delay);
  });

  // Mark last as done, jump to 100%, then advance
  setTimeout(() => {
    const lastIcon = document.getElementById(`lsi-4`);
    if (lastIcon) lastIcon.innerHTML = `<div class="check-icon"><svg viewBox="0 0 12 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,5 4,8 11,1"/></svg></div>`;
    clearInterval(interval);
    const fill = document.getElementById('fake-fill');
    const pctEl = document.getElementById('fake-pct');
    if (fill) { fill.style.transition = 'width 0.8s ease'; fill.style.width = '99%'; }
    if (pctEl) pctEl.textContent = '99%';
    // Pause at 99%, then jump to results
    setTimeout(() => {
      if (fill) { fill.style.width = '100%'; }
      if (pctEl) pctEl.textContent = '100%';
      setTimeout(() => advance(), 800);
    }, 1200);
  }, totalDuration);
}

/* ─── TRY TO LOAD REAL IMAGES ────────────────────────── */
function tryLoadImage(imgSrc, placeholder, imgClass, wrapId) {
  const img = new Image();
  img.onload = () => {
    const wrap = document.getElementById(wrapId);
    if (wrap) {
      wrap.outerHTML = `<img src="${imgSrc}" class="${imgClass}" alt="Ondas cerebrales gamma" width="260" height="195" loading="lazy" />`;
    }
  };
  img.src = imgSrc;
}

function postRender(step) {
  if (step.type === 'break' && step.imgSrc) {
    tryLoadImage(step.imgSrc, null, 'break-brain-img', 'brain-img-wrap');
  }
  if (step.type === 'results') {
    // Try loading doctor image
    const img = new Image();
    img.onload = () => {
      const wrap = document.getElementById('dra-avatar-wrap');
      if (wrap) wrap.innerHTML = `<img src="/images/dra_vargas.webp" class="dra-avatar" alt="Dra. Elisa Vargas" width="80" height="80" />`;
    };
    img.src = '/images/dra_vargas.webp';
  }
}

/* ─── BOOT ───────────────────────────────────────────── */
mount();
